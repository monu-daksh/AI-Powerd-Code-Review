name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review with deepseek-coder-v2
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false   # keep node_modules on disk between runs (self-hosted runner)

      # Smart dependency install: no tar/upload overhead.
      # Workspace persists on self-hosted runners, so we store a SHA-256 hash
      # of package-lock.json and only run npm ci when it actually changes.
      - name: Install dependencies (smart cache)
        run: |
          $lockFile  = "package-lock.json"
          $hashFile  = ".node-modules-hash"
          if (Test-Path $lockFile) {
            $currHash = (Get-FileHash $lockFile -Algorithm SHA256).Hash
          } else {
            $currHash = "no-lock-file"
          }
          if (Test-Path $hashFile) {
            $savedHash = (Get-Content $hashFile -Raw).Trim()
          } else {
            $savedHash = ""
          }

          if (($currHash -ne $savedHash) -or -not (Test-Path "node_modules/.bin")) {
            Write-Host "Installing dependencies (packages changed or first run)..."
            npm ci
            Set-Content -Path $hashFile -Value $currHash
          } else {
            Write-Host "node_modules up to date - skipping install"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get PR diff
        run: |
          $diffContent = git diff origin/${{ github.base_ref }}...HEAD
          if ($diffContent) {
            # Write UTF-8 WITHOUT BOM — PowerShell Out-File adds BOM which breaks Node.js regex
            [System.IO.File]::WriteAllText("pr.diff", ($diffContent -join "`n"), [System.Text.UTF8Encoding]::new($false))
            $size = (Get-Item pr.diff).Length
            Write-Host "Diff size: $size bytes"
            Write-Host "First line: $(($diffContent | Select-Object -First 1))"
          } else {
            Write-Host "Diff is empty - skipping review"
            Add-Content -Path $env:GITHUB_ENV -Value "EMPTY_DIFF=true"
          }

      - name: Ensure Ollama is running
        if: env.EMPTY_DIFF != 'true'
        run: |
          $ok = $false
          try { $ok = (Invoke-WebRequest -Uri http://localhost:11434 -TimeoutSec 3).StatusCode -eq 200 } catch {}
          if (-not $ok) {
            Start-Process ollama -ArgumentList serve -WindowStyle Hidden
            Start-Sleep -Seconds 8
          }
          Write-Host "Ollama ready"

      - name: Ensure model is pulled
        if: env.EMPTY_DIFF != 'true'
        run: |
          Write-Host "Pulling deepseek-coder-v2 (no-op if already cached)..."
          ollama pull deepseek-coder-v2
          Write-Host "Model ready"

      - name: Run AI review
        if: env.EMPTY_DIFF != 'true'
        run: node scripts/review.mjs --diff pr.diff
        continue-on-error: true
        id: ai_review

      - name: Skip message (empty diff)
        if: env.EMPTY_DIFF == 'true'
        run: echo "No changes in diff - skipping review."

      - name: Post review as PR comment
        if: env.EMPTY_DIFF != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let body;
            try {
              body = fs.readFileSync('review.md', 'utf8');
            } catch {
              body = '> AI Code Review script failed. Check the Actions log for details.';
            }

            // Update existing bot comment instead of creating a new one on each push
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(' AI Code Review')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post inline comments for critical/high issues
        if: env.EMPTY_DIFF != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('review.json', 'utf8'));
            } catch {
              return;
            }

            const blocking = report.issues.filter(i =>
              i.severity === 'critical' || i.severity === 'high'
            );

            if (blocking.length === 0) return;

            const ext  = issue => issue.file.split('.').pop() ?? 'ts';
            const lang = issue => ['tsx','ts'].includes(ext(issue)) ? 'tsx'
                                : ['jsx','js'].includes(ext(issue)) ? 'jsx'
                                : ext(issue);

            const comments = blocking.map(issue => {
              const parts = [
                `**${issue.severity === 'critical' ? '🔴 Critical' : '🟠 High'}: ${issue.title}**`,
                issue.description,
                issue.suggestion ? `> 💡 ${issue.suggestion}` : '',
              ];
              if (issue.fix) {
                parts.push('');
                parts.push('**Corrected code:**');
                parts.push('```' + lang(issue));
                parts.push(issue.fix.trim().replace(/^`+|`+$/g, ''));
                parts.push('```');
              }
              return {
                path: issue.file,
                line: issue.line,
                side: 'RIGHT',
                body: parts.filter(Boolean).join('\n'),
              };
            });

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: context.payload.pull_request.head.sha,
                event: 'COMMENT',
                comments,
              });
            } catch (e) {
              console.log('Inline comments failed (line may not be in diff):', e.message);
            }

      - name: Report issues summary
        if: env.EMPTY_DIFF != 'true'
        run: |
          echo "AI Code Review completed. Check the PR comment for the full report."
          echo "Issues are labeled as: critical / high / medium / low"
