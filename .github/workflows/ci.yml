name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true  # ESLint issues reported by AI reviewer, not blocking here

      - name: Run TypeScript type check
        run: npm run type-check
        continue-on-error: true  # Type issues reported by AI reviewer, not blocking here

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          # Use Anthropic in CI (no Ollama available on GitHub-hosted runners)
          # TODO: Add ANTHROPIC_API_KEY to your GitHub repository secrets
          # Go to: Settings → Secrets and variables → Actions → New repository secret
          AI_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # If you prefer to use a self-hosted runner with Ollama, set:
          # AI_PROVIDER: ollama
          # OLLAMA_BASE_URL: http://localhost:11434
          # OLLAMA_MODEL: codellama
